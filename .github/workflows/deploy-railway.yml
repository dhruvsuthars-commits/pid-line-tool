name: Deploy to Railway

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js (for Railway CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Railway CLI
        run: |
          npm i -g @railway/cli || npm i -g railway

      - name: Authenticate Railway
        env:
          RAILWAY_API_KEY: ${{ secrets.RAILWAY_API_KEY }}
        run: |
          if [ -z "$RAILWAY_API_KEY" ]; then echo "RAILWAY_API_KEY secret is not set"; exit 1; fi
          railway login --apiKey "$RAILWAY_API_KEY"

      - name: Build (optional)
        run: |
          cd pid-line-tool
          pip install -r requirements.txt

      - name: Deploy to Railway
        env:
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          if [ -z "$RAILWAY_PROJECT_ID" ]; then echo "RAILWAY_PROJECT_ID secret is not set"; exit 1; fi
          # The railway CLI offers multiple deploy flows. Use `railway up` or `railway run` according to your setup.
          # This command will attempt to deploy the current repository/project to Railway.
          railway up --project "$RAILWAY_PROJECT_ID" --yes || railway deploy --project "$RAILWAY_PROJECT_ID"

      - name: Print status
        run: |
          railway status || true
